{% extends 'inventario/base.html' %}

{% block contenido %}

    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h2 class="h4">{% if producto %}MODIFICAR PRODUCTO{% else %}REGISTRAR PRODUCTO{% endif %}</h2>
            <p class="text-muted">Carga y edición de componentes de inventario.</p>
        </div>
        <a href="{% url 'home_admin' %}" class="btn btn-sm btn-outline-secondary">← VOLVER</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="mb-3">Detalle del producto</h5>
            <form method="POST">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-12 col-md-6">
                        <label class="form-label">Nombre del Producto / Componente</label>
                        <input type="text" name="nombre" class="form-control" value="{{ producto.nombre|default_if_none:'' }}" required />
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">Categoría</label>
                        <select name="categoria" class="form-select" required>
                            <option value="" disabled {% if not producto %}selected{% endif %}>Seleccione una categoría</option>
                            {% for cat in categorias %}
                                <option value="{{ cat.id }}" {% if producto and producto.categoria.id == cat.id %}selected{% endif %}>{{ cat.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">Precio (ARS)</label>
                        <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto.precio|default_if_none:'' }}" required />
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">Stock Inicial</label>
                        <input type="number" name="stock" class="form-control" value="{{ producto.stock|default_if_none:'' }}" min="0" required />
                    </div>
                </div>

                <div class="mt-4 d-flex justify-content-end gap-2">
                    <a href="{% url 'home_admin' %}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-figma-success">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

{% endblock %}
