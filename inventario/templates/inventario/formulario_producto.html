{% extends 'inventario/base.html' %}

{% block content %}
<div class="row">
    <div class="col-12 col-md-8 offset-md-2">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0 fw-bold">
                    {% if producto %}Editar Repuesto{% else %}Nuevo Repuesto - ELITE{% endif %}
                </h4>
            </div>
            <div class="card-body bg-white">
                <form method="POST" class="needs-validation">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="nombre" class="form-label fw-bold">Nombre del Repuesto / Componente</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" 
                               value="{% if producto %}{{ producto.nombre }}{% endif %}" required>
                    </div>

                    <div class="mb-3">
                        <label for="categoria" class="form-label fw-bold">Categoría</label>
                        <select class="form-select" id="categoria" name="categoria" required>
                            <option value="">Seleccioná una categoría...</option>
                            {% for cat in categorias %}
                                <option value="{{ cat.id }}" 
                                    {% if producto and producto.categoria.id == cat.id %}selected{% endif %}>
                                    {{ cat.nombre }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="precio" class="form-label fw-bold">Precio (ARS)</label>
                                <input type="number" class="form-control" id="precio" name="precio" 
                                       step="0.01" value="{% if producto %}{{ producto.precio }}{% endif %}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="stock" class="form-label fw-bold">Stock Inicial</label>
                                <input type="number" class="form-control" id="stock" name="stock" 
                                       value="{% if producto %}{{ producto.stock }}{% endif %}" required>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 justify-content-between">
                        <a href="/home_admin/" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary fw-bold">Guardar Cambios</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
